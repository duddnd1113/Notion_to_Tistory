<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노션 → 티스토리 변환기</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="logo">
        <span class="logo-n">N</span>
        <span class="logo-arrow">→</span>
        <span class="logo-t">T</span>
      </div>
      <span class="topbar-title">노션 → 티스토리 변환기</span>
    </div>
  </header>

  <main class="main">

    <aside class="sidebar">

      <!-- 01 Notion 연결 -->
      <section class="card">
        <h2 class="card-title"><span class="step-num">01</span> Notion 연결</h2>
        <p class="help-text" style="margin-bottom:10px">터미널에서 <code>npm start</code> 실행 후 사용하세요.</p>
        <div class="field">
          <label for="notionToken">Notion Integration Token</label>
          <div class="input-with-toggle">
            <input type="password" id="notionToken" placeholder="secret_..." autocomplete="off">
            <button class="toggle-vis" onclick="toggleVis('notionToken')" title="보기/숨기기">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="btn-save" onclick="saveKeys()">저장</button>
        <p class="help-text">토큰은 브라우저 로컬에만 저장됩니다.</p>
      </section>

      <!-- 02 페이지 URL -->
      <section class="card">
        <h2 class="card-title"><span class="step-num">02</span> 노션 페이지 URL</h2>
        <div class="field">
          <label for="notionUrl">노션 페이지 링크 붙여넣기</label>
          <input type="text" id="notionUrl"
            placeholder="https://www.notion.so/..."
            oninput="onUrlInput(this.value)"
            onpaste="setTimeout(()=>onUrlInput(this.value),0)">
        </div>
        <div id="urlStatus" class="status hidden"></div>
      </section>

      <!-- 03 변환 옵션 -->
      <section class="card">
        <h2 class="card-title"><span class="step-num">03</span> 변환 옵션</h2>
        <div class="options-grid">
          <label class="opt-label"><input type="checkbox" id="optKatex" checked> KaTeX 수식</label>
          <label class="opt-label"><input type="checkbox" id="optImages" checked> 이미지 포함</label>
          <label class="opt-label"><input type="checkbox" id="optMeta"> 페이지 정보</label>
          <label class="opt-label"><input type="checkbox" id="optToc"> 목차(TOC)</label>
        </div>
        <button class="btn-primary" onclick="convertPage()" id="convertBtn" disabled>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:5px;vertical-align:-2px"><polyline points="13 2 13 9 20 9"/><path d="M3 22V2h10l5 5v15a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>
          변환하기
        </button>
        <div id="convertStatus" class="status hidden"></div>
      </section>

    </aside>

    <!-- 미리보기 패널 -->
    <section class="preview-panel">
      <div class="preview-header">
        <div class="preview-tabs">
          <button class="tab active" id="tab-rendered" onclick="switchTab('rendered')">미리보기</button>
          <button class="tab" id="tab-html" onclick="switchTab('html')">HTML 소스</button>
        </div>
        <div class="preview-actions">
          <span id="charCount" class="char-count"></span>
          <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            HTML 복사
          </button>
        </div>
      </div>

      <div class="preview-body">
        <div id="preview-rendered" class="preview-content">
          <div class="empty-state">
            <div class="empty-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </div>
            <p>노션 페이지 URL을 붙여넣고<br>변환하기를 누르세요</p>
          </div>
        </div>
        <div id="preview-html" class="preview-content code-view hidden"></div>
      </div>

      <div class="tistory-guide hidden" id="tistoryGuide">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        티스토리 에디터 우측 상단 <strong>&lt;/&gt; HTML</strong> 버튼 클릭 → 붙여넣기
      </div>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
